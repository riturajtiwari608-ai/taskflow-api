services:
  web:
    build: .
    container_name: taskflow-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskflow_db
      TEST_DATABASE_URL: postgresql://postgres:postgres@db:5432/taskflow_test_db
      SECRET_KEY: taskflow_secret_123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: 15
      REDIS_URL: redis://redis:6379/0
      CACHE_EXPIRE_SECONDS: 300
      LOGIN_RATE_LIMIT: 5
      REGISTER_RATE_LIMIT: 3
      FORGOT_PASSWORD_RATE_LIMIT: 3
      RATE_LIMIT_WINDOW_SECONDS: 60
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15
    container_name: taskflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: taskflow-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: