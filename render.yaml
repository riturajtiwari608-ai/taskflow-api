services:
  - type: web
    name: taskflow-api
    runtime: docker
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: PASSWORD_RESET_TOKEN_EXPIRE_MINUTES
        value: "15"

databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow
